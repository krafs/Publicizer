name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override, without leading v (e.g. 2.4.0). Leave blank to auto-resolve from semver labels.'
        required: false
        type: string
      dry-run:
        description: 'Build and pack only. Skip nuget push, tag, and GitHub Release.'
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      pull-requests: read
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Resolve version
      id: resolve
      env:
        GH_TOKEN: ${{ github.token }}
        OVERRIDE: ${{ inputs.version }}
      run: node scripts/resolve-version.mjs

    - name: Set up .NET
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
      with:
        cache: true
        cache-dependency-path: src/Publicizer/packages.lock.json

    - name: Restore
      run: dotnet restore --locked-mode

    - name: Build
      env:
        VERSION: ${{ steps.resolve.outputs.version }}
      run: dotnet build -c Release --no-restore -p:Version="$VERSION"

    - name: Test
      run: dotnet test -c Release --no-build --no-restore

    - name: Pack
      env:
        VERSION: ${{ steps.resolve.outputs.version }}
      run: dotnet pack src/Publicizer/Publicizer.csproj -c Release --no-build -p:Version="$VERSION" -o artifacts

    - name: Attest build provenance
      if: ${{ !inputs.dry-run }}
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
      with:
        subject-path: artifacts/*.nupkg

    - name: NuGet login
      if: ${{ !inputs.dry-run }}
      id: login
      uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
      with:
        user: krafs

    - name: Push to NuGet.org
      if: ${{ !inputs.dry-run }}
      env:
        NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
      run: dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Tag and create GitHub Release
      if: ${{ !inputs.dry-run }}
      env:
        GH_TOKEN: ${{ github.token }}
        VERSION: ${{ steps.resolve.outputs.version }}
      run: |
        git tag "v$VERSION"
        git push origin "v$VERSION"
        gh release create "v$VERSION" --title "v$VERSION" --generate-notes
