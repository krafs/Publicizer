name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override, without leading v (e.g. 2.4.0). Leave blank to auto-resolve from semver labels.'
        required: false
        type: string
      dry-run:
        description: 'Build and pack only. Skip nuget push, tag, and GitHub Release.'
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Resolve version
      id: resolve
      env:
        GH_TOKEN: ${{ github.token }}
        OVERRIDE: ${{ inputs.version }}
      run: |
        set -euo pipefail

        semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
        base_tag=""
        bump=""

        if [[ -n "$OVERRIDE" ]]; then
          [[ "$OVERRIDE" =~ $semver_re ]] || { echo "::error::Invalid version override: $OVERRIDE"; exit 1; }
          version="$OVERRIDE"
        else
          base_tag="$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [[ -z "$base_tag" ]]; then
            echo "::error::No version tag found. Set the version input to seed the first release."
            exit 1
          fi
          echo "Base tag: $base_tag"

          mapfile -t prs < <(git log "$base_tag"..HEAD --format=%s | sed -nE 's/.*\(#([0-9]+)\)$/\1/p' | sort -un)

          if [[ ${#prs[@]} -eq 0 ]]; then
            if [[ "$(git rev-list --count "$base_tag"..HEAD)" -eq 0 ]]; then
              echo "::error::No commits since $base_tag. Nothing to release."
            else
              echo "::error::Commits exist since $base_tag but no squash-merged PRs were found."
            fi
            exit 1
          fi

          rank_of() {
            case "$1" in
              semver:major) echo 3 ;;
              semver:minor) echo 2 ;;
              semver:patch) echo 1 ;;
              semver:none)  echo 0 ;;
              *)            echo -1 ;;
            esac
          }

          overall=0
          unlabeled=()
          for pr in "${prs[@]}"; do
            pr_rank=-1
            while IFS= read -r label; do
              r=$(rank_of "$label")
              if [[ $r -gt $pr_rank ]]; then pr_rank=$r; fi
            done < <(gh pr view "$pr" --json labels --jq '.labels[].name')
            if [[ $pr_rank -lt 0 ]]; then
              unlabeled+=("$pr")
            elif [[ $pr_rank -gt $overall ]]; then
              overall=$pr_rank
            fi
          done

          if [[ ${#unlabeled[@]} -gt 0 ]]; then
            echo "::error::PRs since $base_tag missing a semver label: ${unlabeled[*]}"
            exit 1
          fi

          case "$overall" in
            3) bump=major ;;
            2) bump=minor ;;
            1) bump=patch ;;
            *) echo "::error::No version-bumping changes since $base_tag (all PRs are semver:none)."; exit 1 ;;
          esac

          IFS='.' read -r major minor patch <<< "${base_tag#v}"
          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          version="$major.$minor.$patch"
          echo "Resolved $bump bump: $base_tag -> v$version"
        fi

        if git rev-parse "v$version" >/dev/null 2>&1; then
          echo "::error::Tag v$version already exists."
          exit 1
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"
        {
          echo "## Release v$version"
          if [[ -n "$OVERRIDE" ]]; then
            echo "- Source: manual override"
          else
            echo "- Source: resolved \`$bump\` bump from \`$base_tag\`"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Set up .NET
      uses: actions/setup-dotnet@v5.2.0

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore -warnaserror -p:Version=${{ steps.resolve.outputs.version }}

    - name: Test
      run: dotnet test -c Release --no-build

    - name: Pack
      run: dotnet pack src/Publicizer/Publicizer.csproj -c Release --no-build -p:Version=${{ steps.resolve.outputs.version }} -o artifacts

    - name: NuGet login
      if: ${{ !inputs.dry-run }}
      id: login
      uses: NuGet/login@v1
      with:
        user: krafs

    - name: Push to NuGet.org
      if: ${{ !inputs.dry-run }}
      run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Tag and create GitHub Release
      if: ${{ !inputs.dry-run }}
      env:
        GH_TOKEN: ${{ github.token }}
        VERSION: ${{ steps.resolve.outputs.version }}
      run: |
        git tag "v$VERSION"
        git push origin "v$VERSION"
        gh release create "v$VERSION" --title "v$VERSION" --generate-notes
