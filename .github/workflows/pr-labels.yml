name: PR Labels

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read

jobs:
  semver-label:
    name: SemVer label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const valid = ['SemVer:Major', 'SemVer:Minor', 'SemVer:Patch', 'SemVer:None'];
            const found = context.payload.pull_request.labels
              .map(l => l.name)
              .filter(l => valid.includes(l));
            if (found.length !== 1) {
              core.setFailed(
                `PR must have exactly one SemVer label (${valid.join(', ')}). ` +
                `Found: ${found.length ? found.join(', ') : 'none'}.`
              );
            }
