version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "semver:patch"
    cooldown:
      default-days: 7
    groups:
      nuget-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "semver:patch"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "semver:patch"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
